  <text x="790" y="520" fill="#9AD8E6" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Flow</text>

  <rect x="896" y="500" width="128" height="30" rx="15" fill="#0F263C"/>
  <text x="922" y="520" fill="#9AD8E6" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Experiment</text>

  <rect x="1034" y="500" width="128" height="30" rx="15" fill="#0F263C"/>
  <text x="1068" y="520" fill="#9AD8E6" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Writer</text>
